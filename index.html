<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Samples — Lena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cherry: #4ABED9;
    --cherry-glow: rgba(74, 190, 217, 0.25);
    --bg-deep: #0A0A0B;
    --bg-card: #141416;
    --bg-card-hover: #1A1A1D;
    --text-primary: #F1F1F1;
    --text-muted: #8A8A8E;
    --text-subtle: #5A5A5E;
    --border: rgba(255,255,255,0.06);
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Instrument Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* subtle grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    pointer-events: none;
    z-index: 100;
  }

  .page-wrapper {
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* ─── HEADER ─── */
  .header {
    text-align: center;
    margin-bottom: 64px;
    animation: fadeUp 0.8s ease-out both;
  }

  .header .tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(74, 190, 217, 0.08);
    border: 1px solid rgba(74, 190, 217, 0.2);
    border-radius: 100px;
    padding: 6px 18px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--cherry);
    margin-bottom: 24px;
  }

  .header .tag .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--cherry);
    animation: pulse 2s ease-in-out infinite;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }

  .header h1 em {
    font-style: italic;
    color: var(--cherry);
  }

  .header p {
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.6;
    max-width: 520px;
    margin: 0 auto;
  }

  /* ─── BRAND STRIP ─── */
  .brands {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeUp 0.8s ease-out 0.15s both;
  }

  .brands .brands-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-subtle);
    margin-bottom: 20px;
  }

  .brands .brands-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
  }

  .brands .brands-list span {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    padding: 6px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    transition: border-color 0.2s ease, color 0.2s ease;
  }

  .brands .brands-list span:hover {
    border-color: rgba(74, 190, 217, 0.3);
    color: var(--cherry);
  }

  /* ─── GRID ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  @media (max-width: 768px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
  }

  @media (max-width: 480px) {
    .grid {
      grid-template-columns: 1fr;
      gap: 16px;
      max-width: 320px;
      margin: 0 auto;
    }
  }

  /* ─── VIDEO CARD ─── */
  .card {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--bg-card);
    border: 1px solid var(--border);
    aspect-ratio: 9 / 16;
    cursor: pointer;
    transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                border-color 0.3s ease,
                box-shadow 0.3s ease;
    animation: fadeUp 0.7s ease-out both;
  }

  .card:nth-child(1) { animation-delay: 0.1s; }
  .card:nth-child(2) { animation-delay: 0.18s; }
  .card:nth-child(3) { animation-delay: 0.26s; }
  .card:nth-child(4) { animation-delay: 0.34s; }
  .card:nth-child(5) { animation-delay: 0.42s; }
  .card:nth-child(6) { animation-delay: 0.50s; }

  .card:hover {
    transform: translateY(-4px) scale(1.015);
    border-color: rgba(74, 190, 217, 0.3);
    box-shadow: 0 12px 40px rgba(74, 190, 217, 0.1),
                0 4px 16px rgba(0,0,0,0.4);
  }

  .card .thumbnail {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .card:hover .thumbnail {
    transform: scale(1.04);
  }

  /* placeholder state (before real thumbnails) */
  .card .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: linear-gradient(165deg, var(--bg-card) 0%, #1c1c20 100%);
  }

  .card .placeholder .icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(74, 190, 217, 0.1);
    border: 1px solid rgba(74, 190, 217, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s ease;
  }

  .card:hover .placeholder .icon {
    background: rgba(74, 190, 217, 0.2);
  }

  .card .placeholder .icon svg {
    width: 18px;
    height: 18px;
    fill: var(--cherry);
    margin-left: 2px;
  }

  .card .placeholder span {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-subtle);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* overlay gradient on cards with thumbnails */
  .card .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(10,10,11,0.85) 0%,
      rgba(10,10,11,0.15) 35%,
      transparent 60%
    );
    pointer-events: none;
    z-index: 1;
  }

  /* play button on hover */
  .card .play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.85);
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: rgba(74, 190, 217, 0.9);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 2;
  }

  .card:hover .play-btn {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  .card .play-btn svg {
    width: 18px;
    height: 18px;
    fill: white;
    margin-left: 2px;
  }

  /* card label */
  .card .label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px;
    z-index: 2;
  }

  .card .label .brand {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cherry);
    margin-bottom: 4px;
  }

  .card .label .title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.35;
  }

  /* ─── FOOTER ─── */
  .footer {
    text-align: center;
    margin-top: 56px;
    animation: fadeUp 0.8s ease-out 0.6s both;
  }

  .footer a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    background: var(--cherry);
    color: white;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    border-radius: 100px;
    transition: background 0.2s ease, box-shadow 0.3s ease, transform 0.2s ease;
  }

  .footer a:hover {
    background: #3AAAC2;
    box-shadow: 0 4px 24px var(--cherry-glow);
    transform: translateY(-1px);
  }

  .footer a svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
    transition: transform 0.2s ease;
  }

  .footer a:hover svg {
    transform: translateX(3px);
  }

  .footer .sub {
    margin-top: 16px;
    font-size: 12px;
    color: var(--text-subtle);
  }

  /* ─── VIDEO MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(8px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-content {
    position: relative;
    width: 90vw;
    max-width: 400px;
    aspect-ratio: 9 / 16;
    border-radius: var(--radius);
    overflow: hidden;
    cursor: default;
    animation: modalIn 0.3s ease-out;
  }

  .modal-content iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .modal-close {
    position: absolute;
    top: -44px;
    right: 0;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease;
  }

  .modal-close:hover {
    background: rgba(255,255,255,0.2);
  }

  @keyframes modalIn {
    from {
      opacity: 0;
      transform: scale(0.92);
    }
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>

<div class="page-wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="tag">
      <span class="dot"></span>
      Lena
    </div>
    <h1>Selected <em>Creative</em> Work</h1>
    <p>A curated sample of high-performing UGC, VSLs, and paid social ads built across DTC brands.</p>
  </div>

  <!-- BRANDS -->
  <div class="brands">
    <div class="brands-label">Most recent partnerships</div>
    <div class="brands-list">
      <span>Nutrivo Health</span>
      <span>TAO Clean</span>

  <!-- GRID -->
  <div class="grid">

    <!--
      ╔══════════════════════════════════════════════════════╗

      ║  1. Replace the <div class="placeholder">...</div>  ║
      ║     inside each card with:                          ║
      ║                                                     ║
      ║     <img class="thumbnail"                          ║
      ║          src="your-thumbnail.jpg"                   ║
      ║          alt="Description" />                       ║
      ║     <div class="overlay"></div>                     ║
      ║                                                     ║
      ║  2. Update the brand name and ad title in .label    ║
      ║                                                     ║
      ║  3. Update the <a href="..."> link to your video    ║
      ║     (Google Drive, Loom, YouTube, etc.)             ║
      ║                                                     ║
      ║  To add a 7th card, just copy any card block        ║
      ║  and paste it before </div><!-- end grid -->
    <!--  ╚══════════════════════════════════════════════════════╝
    -->

    <!-- CARD 1 — BeKynd Scalp Monster -->
    <div class="card" onclick="openVideo('10lGouWrETPmPqgCmMnhlr1CWN7xiCrDw')">
      <img class="thumbnail" src="3.png" alt="BeKynd Scalp Ad" />
      <div class="overlay"></div>
      <div class="play-btn">
        <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>
      </div>
    </div>

    <!-- CARD 2 — Wuffes Dog Podcast -->
    <div class="card" onclick="openVideo('1yFhfwmDAW5IeORh-QY118V7MWd97NZS7')">
      <img class="thumbnail" src="4.png" alt="Wuffes Podcast Ad" />
      <div class="overlay"></div>
      <div class="play-btn">
        <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>
      </div>
    </div>

    <!-- CARD 3 — Wuffes Luna Supplements -->
    <div class="card" onclick="openVideo('1S93CCNM19CoCHrH-opV8-_ZoA_W-B3P0')">
      <img class="thumbnail" src="5.png" alt="Wuffes Luna Ad" />
      <div class="overlay"></div>
      <div class="play-btn">

    <!-- CARD 4 — Gummies -->
    <div class="card" onclick="openVideo('1Om0KjcpWdUQE3Lc4aswcduUkPAkWe7L4')">

        <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>

    <div class="card" onclick="openVideo('1jiw7W6l1f6_N4eNjfbhc0YoHfoOWyWVK')">

      <div class="play-btn">
        <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>
      </div>
    </div>

    <!-- CARD 6 — COMING SOON (swap in your video later) -->

      <div class="placeholder">
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:var(--cherry);">

  </div><!-- end grid -->

  <!-- FOOTER CTA -->
  <div class="footer">

      View Full Portfolio
      <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
    <div class="sub">Lena — DTC Creative Strategy</div>
  </div>

</div>

<!-- VIDEO MODAL -->
<div class="modal-overlay" id="videoModal" onclick="closeVideo(event)">
  <div class="modal-content">
    <button class="modal-close" onclick="closeVideo(event)">✕</button>
    <iframe id="videoFrame" src="" allow="autoplay" allowfullscreen></iframe>
  </div>
</div>

<script>
  function openVideo(fileId) {
    const modal = document.getElementById('videoModal');
    const frame = document.getElementById('videoFrame');
    frame.src = 'https://drive.google.com/file/d/' + fileId + '/preview';
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeVideo(e) {
    if (e.target.classList.contains('modal-overlay') || e.target.classList.contains('modal-close')) {
      const modal = document.getElementById('videoModal');
      const frame = document.getElementById('videoFrame');
      frame.src = '';
      modal.classList.remove('active');
      document.body.style.overflow = '';
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      const modal = document.getElementById('videoModal');
      const frame = document.getElementById('videoFrame');
      frame.src = '';
      modal.classList.remove('active');
      document.body.style.overflow = '';
    }
  });
</script>

</body>
</html>
